<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div id="top-container">
            <h1 id="title">Metric/Imperial Unit Conversion</h1>
            <input id="unit-input" type="text">
            <button id="convert-btn">Convert</button>
        </div>
        <div id="bottom-container">
            <div class="bg-box1">
                <h2 class="sub-title">Length (Meter/Feet)</h2>
                <p class="unit-results" id="result1"></p>    
            </div>
            <div class="bg-box2">
                <h2 class="sub-title">Volume (Liters/Gallons)</h2>
                <p class="unit-results" id="result2"></p>    
            </div>
            <div class="bg-box3">
                <h2 class="sub-title">Mass (Kilograms/Pounds)</h2>
                <p class="unit-results" id="result3"></p>    
            </div>
        <script src="index.js"></script>
    </body>
</html>
